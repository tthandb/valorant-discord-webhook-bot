name: Daily Shop

on:
  schedule:
    - cron: "0 0 * * *"       # 00:00 UTC (07:00 GMT+7)
  workflow_dispatch:

jobs:
  daily-shop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Restore bot state cache
        uses: actions/cache/restore@v5
        with:
          path: state.json
          key: bot-state-shop-${{ github.run_id }}
          restore-keys: |
            bot-state-shop-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check daily shop
        env:
          DAILY_SHOP_WEBHOOK_URL: ${{ secrets.DAILY_SHOP_WEBHOOK_URL }}
          RIOT_ACCOUNTS: ${{ secrets.RIOT_ACCOUNTS }}
        run: python daily_shop.py --once

      - name: Ensure state file exists
        if: always()
        run: test -f state.json || echo '{}' > state.json

      - name: Save bot state cache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: state.json
          key: bot-state-shop-${{ github.run_id }}

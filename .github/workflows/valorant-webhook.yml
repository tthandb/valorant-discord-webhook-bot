name: Valorant Webhook Bot

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/30 * * * *"    # forum posts every 30 min
    - cron: "0 0 * * *"       # daily shop at 00:00 UTC (07:00 GMT+7)
  workflow_dispatch:
    inputs:
      task:
        description: "Which task to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - forum
          - shop

jobs:
  forum-posts:
    if: github.event.schedule != '0 0 * * *'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Restore bot state cache
        uses: actions/cache/restore@v5
        with:
          path: state.json
          key: bot-state-forum-${{ github.run_id }}
          restore-keys: |
            bot-state-forum-
            bot-state-shop-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check forum posts
        env:
          FORUM_WEBHOOK_URL: ${{ secrets.FORUM_WEBHOOK_URL }}
          FORUM_TAGS: ${{ secrets.FORUM_TAGS }}
        run: python forum_post.py --once

      - name: Ensure state file exists
        if: always()
        run: test -f state.json || echo '{}' > state.json

      - name: Save bot state cache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: state.json
          key: bot-state-forum-${{ github.run_id }}

  daily-shop:
    if: github.event.schedule == '0 0 * * *' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.task != 'forum')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Restore bot state cache
        uses: actions/cache/restore@v5
        with:
          path: state.json
          key: bot-state-shop-${{ github.run_id }}
          restore-keys: |
            bot-state-shop-
            bot-state-forum-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check daily shop
        env:
          DAILY_SHOP_WEBHOOK_URL: ${{ secrets.DAILY_SHOP_WEBHOOK_URL }}
          RIOT_ACCOUNTS: ${{ secrets.RIOT_ACCOUNTS }}
        run: python main.py --once --shop

      - name: Ensure state file exists
        if: always()
        run: test -f state.json || echo '{}' > state.json

      - name: Save bot state cache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: state.json
          key: bot-state-shop-${{ github.run_id }}

name: Forum Posts

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/30 * * * *"    # every 30 min
  workflow_dispatch:
    inputs:
      pop_seen:
        description: "Pop the last N entries from seen_forum_links before running"
        required: false
        default: "0"

jobs:
  forum-posts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Restore bot state cache
        uses: actions/cache/restore@v5
        with:
          path: state.json
          key: bot-state-forum-${{ github.run_id }}
          restore-keys: |
            bot-state-forum-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pop last N entries from seen_forum_links
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.pop_seen != '0' }}
        run: |
          test -f state.json || echo '{}' > state.json
          python -c "
          import json, os
          n = int(os.environ['POP_N'])
          with open('state.json') as f:
              s = json.load(f)
          seen = s.get('seen_forum_links', [])
          removed = seen[-n:] if n > 0 else []
          s['seen_forum_links'] = seen[:-n] if n > 0 else seen
          with open('state.json', 'w') as f:
              json.dump(s, f, indent=2)
          print(f'Removed {len(removed)} entries:')
          for link in removed:
              print(f'  - {link}')
          "
        env:
          POP_N: ${{ inputs.pop_seen }}

      - name: Check forum posts
        env:
          FORUM_WEBHOOK_URL: ${{ secrets.FORUM_WEBHOOK_URL }}
          FORUM_TAGS: ${{ secrets.FORUM_TAGS }}
        run: python forum_post.py --once

      - name: Ensure state file exists
        if: always()
        run: test -f state.json || echo '{}' > state.json

      - name: Save bot state cache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: state.json
          key: bot-state-forum-${{ github.run_id }}

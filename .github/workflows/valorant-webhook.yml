name: Valorant Webhook Bot

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/30 * * * *"    # patch notes every 30 min
    - cron: "0 0 * * *"       # daily shop at 00:00 UTC (07:00 GMT+7)
  workflow_dispatch:
    inputs:
      task:
        description: "Which task to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - articles
          - shop

permissions:
  contents: write

jobs:
  patch-notes:
    if: github.event.schedule != '0 0 * * *'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check patch notes
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py --once --articles

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update state.json"
          git push

  daily-shop:
    if: github.event.schedule == '0 0 * * *' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.task != 'articles')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check daily shop
        env:
          SHOP_WEBHOOK_URL: ${{ secrets.SHOP_WEBHOOK_URL }}
          RIOT_ACCOUNTS: ${{ secrets.RIOT_ACCOUNTS }}
        run: python main.py --once --shop

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update state.json"
          git push

name: Session Recap

on:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: 'once' for session check, 'now' for immediate recap"
        default: "now"
        type: choice
        options:
          - now
          - once

concurrency:
  group: session-state
  cancel-in-progress: false

jobs:
  session-recap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Restore session state cache
        uses: actions/cache/restore@v5
        with:
          path: session_state.json
          key: session-state-${{ github.run_id }}
          restore-keys: |
            session-state-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check session
        env:
          SESSION_RECAP_WEBHOOK_URL: ${{ secrets.SESSION_RECAP_WEBHOOK_URL }}
          TEAM_PUUIDS: ${{ secrets.TEAM_PUUIDS }}
          HENRIK_API_KEY: ${{ secrets.HENRIK_API_KEY }}
          HENRIK_API_REGION: ${{ secrets.HENRIK_API_REGION }}
        run: python session_recap.py --${{ github.event.inputs.mode || 'once' }}

      - name: Ensure session state file exists
        if: always()
        run: test -f session_state.json || echo '{}' > session_state.json

      - name: Save session state cache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: session_state.json
          key: session-state-${{ github.run_id }}

name: Session Recap

on:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes
  workflow_dispatch:

concurrency:
  group: session-state
  cancel-in-progress: false

jobs:
  session-recap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Restore session state cache
        uses: actions/cache@v4
        with:
          path: session_state.json
          key: session-state-v1
          save-always: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check session
        env:
          SESSION_RECAP_WEBHOOK_URL: ${{ secrets.SESSION_RECAP_WEBHOOK_URL }}
          TEAM_PUUIDS: ${{ secrets.TEAM_PUUIDS }}
          HENRIK_API_KEY: ${{ secrets.HENRIK_API_KEY }}
          HENRIK_API_REGION: ${{ secrets.HENRIK_API_REGION }}
        run: python session_recap.py --once
